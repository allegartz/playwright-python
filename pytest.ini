[pytest]
# Pytest configuration

# Test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test directories
testpaths = tests examples

# Output options
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --html=reports/report.html
    --self-contained-html

# Markers
markers =
    smoke: Smoke tests
    regression: Regression tests
    slow: Slow running tests
    integration: Integration tests
    unit: Unit tests

# Logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Coverage
# coverage options would go here if needed

# Playwright settings
# These are handled by pytest-playwright plugin
